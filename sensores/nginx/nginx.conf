events {
    worker_connections 1024;
}

http {

    # ── Upstream: round-robin entre las 3 APIs ──────────────
    upstream apis_clima {
        server api1:5000;
        server api2:5000;
        server api3:5000;
    }

    server {
        listen 80;

        # ── Todas las rutas pasan por el load balancer ───────
        location / {
            proxy_pass         http://apis_clima;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Encabezado personalizado para identificar el LB
            add_header X-Load-Balancer "Nginx-LB" always;
        }
    }
}
